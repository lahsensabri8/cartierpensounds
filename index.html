<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cartier Pen Sounds</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;
  --surface:#111111;
  --surface2:#181818;
  --border:#2a2a2a;
  --text:#e0e0e0;
  --muted:#888;
  --accent:#ffffff;
  --dim:#aaa;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:14px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* NAV */
nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.5rem 3rem;
  border-bottom:1px solid var(--border);
}
.nav-logo img{height:38px;width:auto;filter:brightness(1.2);}
.nav-contact{
  font-size:0.7rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--dim);
  text-decoration:none;
  transition:color 0.2s;
  font-weight:500;
}
.nav-contact:hover{color:var(--accent);}

/* HERO */
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:4rem 3rem;
  max-width:800px;
  margin:0 auto;
  width:100%;
}
.hero-logo{margin-bottom:3rem;}
.hero-logo img{height:80px;width:auto;filter:brightness(1.15);}
.hero-line1{
  font-family:'Outfit',sans-serif;
  font-size:clamp(1rem,2.5vw,1.4rem);
  font-weight:400;
  color:var(--text);
  margin-bottom:0.4rem;
}
.hero-line2{
  font-family:'Outfit',sans-serif;
  font-size:0.75rem;
  color:var(--dim);
  letter-spacing:0.05em;
}

/* MUSIC */
.music{
  max-width:800px;
  margin:0 auto;
  width:100%;
  padding:0 3rem 5rem;
}

/* NOW PLAYING */
.np{
  background:var(--surface);
  border:1px solid var(--border);
  padding:1.5rem 1.75rem;
  margin-bottom:1px;
}
.np-label{
  font-size:0.6rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:0.75rem;
  font-weight:500;
}
.np-title{
  font-family:'Outfit',sans-serif;
  font-size:1.2rem;
  font-weight:600;
  color:var(--accent);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:0.2rem;
}
.np-artist{font-size:0.7rem;color:var(--dim);}
.prog-wrap{
  width:100%;height:1px;
  background:var(--border);
  cursor:pointer;margin:1.25rem 0 0.5rem;
  position:relative;
}
.prog-fill{height:100%;background:var(--accent);width:0%;transition:width 0.1s linear;pointer-events:none;}
.time-row{display:flex;justify-content:space-between;font-size:0.62rem;color:var(--dim);}
.controls{display:flex;align-items:center;gap:1.25rem;margin-top:1.25rem;}
.ctrl{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;transition:color 0.15s;}
.ctrl:hover{color:var(--accent);}
.ctrl.play{
  width:38px;height:38px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--accent);
  transition:all 0.15s;
}
.ctrl.play:hover{background:var(--accent);color:var(--bg);}
.vol-wrap{display:flex;align-items:center;gap:0.5rem;margin-left:auto;}
.vol{
  -webkit-appearance:none;appearance:none;
  width:65px;height:1px;
  background:var(--border);outline:none;cursor:pointer;
}
.vol::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:8px;height:8px;
  background:var(--accent);cursor:pointer;border-radius:0;
}

/* PLAYLIST */
.playlist{
  border:1px solid var(--border);
  border-top:none;
  max-height:340px;
  overflow-y:auto;
}
.playlist::-webkit-scrollbar{width:2px;}
.playlist::-webkit-scrollbar-thumb{background:var(--border);}
.track{
  display:grid;
  grid-template-columns:26px 1fr auto;
  align-items:center;
  gap:0.75rem;
  padding:0.85rem 1.75rem;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  background:var(--surface);
  transition:background 0.1s;
}
.track:last-child{border-bottom:none;}
.track:hover{background:var(--surface2);}
.track.active{background:#111;}
.track.active .t-num{display:none;}
.track.active .t-eq{display:flex;}
.t-num{font-size:0.62rem;color:var(--dim);text-align:center;}
.t-eq{display:none;align-items:center;justify-content:center;gap:2px;}
.t-eq span{display:block;width:2px;background:var(--accent);animation:eq 0.8s ease infinite;}
.t-eq span:nth-child(1){height:8px;animation-delay:0s;}
.t-eq span:nth-child(2){height:12px;animation-delay:0.15s;}
.t-eq span:nth-child(3){height:6px;animation-delay:0.3s;}
.t-info{overflow:hidden;}
.t-title{
  font-family:'Outfit',sans-serif;
  font-size:0.76rem;font-weight:600;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.track.active .t-title{color:var(--accent);}
.t-artist{font-size:0.62rem;color:var(--dim);margin-top:0.1rem;}
.t-dur{font-size:0.62rem;color:var(--dim);white-space:nowrap;}

/* FOOTER */
footer{
  border-top:1px solid var(--border);
  padding:1.25rem 3rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:800px;
  margin:0 auto;
  width:100%;
}
footer p{font-size:0.62rem;color:var(--dim);letter-spacing:0.05em;}
.coffee{
  font-size:0.68rem;
  letter-spacing:0.1em;
  color:var(--dim);
  text-decoration:none;
  transition:color 0.2s;
  font-weight:500;
}
.coffee:hover{color:var(--accent);}

@keyframes eq{
  0%,100%{transform:scaleY(0.4);}
  50%{transform:scaleY(1);}
}

@media(max-width:600px){
  nav,.hero,.music,footer{padding-left:1.5rem;padding-right:1.5rem;}
  .music{padding-bottom:3rem;}
}
</style>
</head>

const vol = document.getElementById("vol");

let cur = 0, playing = false;
const durations = new Array(tracks.length).fill("—");

function fmt(s){
  if(!s||isNaN(s))return"—";
  return Math.floor(s/60)+":"+(Math.floor(s%60)+"").padStart(2,"0");
}

// Preload durations for all tracks silently
tracks.forEach((t,i)=>{
  if(!t.src)return;
  const a=new Audio();
  a.preload="metadata";
  a.addEventListener("loadedmetadata",()=>{
    durations[i]=fmt(a.duration);
    const el=document.querySelector(`.track:nth-child(${i+1}) .t-dur`);
    if(el)el.textContent=durations[i];
  });
  a.src=t.src;
});

function buildList(){
  playlist.innerHTML="";
  tracks.forEach((t,i)=>{
    const el=document.createElement("div");
    el.className="track"+(i===cur?" active":"");
    el.innerHTML=`
      <div class="t-num">${String(i+1).padStart(2,"0")}</div>
      <div class="t-eq"><span></span><span></span><span></span></div>
      <div class="t-info">
        <div class="t-title">${t.title}</div>
        <div class="t-artist">${t.artist}</div>
      </div>
      <div class="t-dur">${durations[i]}</div>`;
    el.addEventListener("click",()=>load(i,true));
    playlist.appendChild(el);
  });
}

function load(i,autoplay=false){
  cur=i;
  const t=tracks[i];
  npTitle.textContent=t.title;
  npArtist.textContent=t.artist;
  audio.src=t.src;
  progFill.style.width="0%";
  tCur.textContent="0:00";
  tTot.textContent="0:00";
  buildList();
  if(autoplay)audio.play().then(()=>setPlaying(true)).catch(()=>{});
}

function setPlaying(s){
  playing=s;
  icPlay.style.display=s?"none":"block";
  icPause.style.display=s?"block":"none";
}

btnPlay.addEventListener("click",()=>{
  if(!audio.src&&tracks[0].src)load(0,true);
  else if(playing){audio.pause();setPlaying(false);}
  else audio.play().then(()=>setPlaying(true)).catch(()=>{});
});
btnPrev.addEventListener("click",()=>load((cur-1+tracks.length)%tracks.length,playing));
btnNext.addEventListener("click",()=>load((cur+1)%tracks.length,playing));
audio.addEventListener("timeupdate",()=>{
  if(!audio.duration)return;
  progFill.style.width=(audio.currentTime/audio.duration*100)+"%";
  tCur.textContent=fmt(audio.currentTime);
  tTot.textContent=fmt(audio.duration);
});
audio.addEventListener("ended",()=>load((cur+1)%tracks.length,true));
audio.addEventListener("play",()=>setPlaying(true));
audio.addEventListener("pause",()=>setPlaying(false));
progWrap.addEventListener("click",e=>{
  if(!audio.duration)return;
  const r=progWrap.getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});
vol.addEventListener("input",()=>audio.volume=vol.value);
audio.volume=0.8;
load(0,false);
</script>
</body>
</html>
